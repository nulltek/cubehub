services:
  - type: web
    name: cubehub
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DATA_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cubehub-db
          property: connectionString

databases:
  - name: cubehub-db
    plan: free
